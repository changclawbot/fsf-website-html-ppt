const grid=document.getElementById('grid');
const search=document.getElementById('search');
const filter=document.getElementById('categoryFilter');
const countStat=document.getElementById('countStat');
const categories=[...new Set(items.map(i=>i.category).filter(Boolean))];
categories.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;filter.appendChild(o);});
function render(){
  const q=search.value.trim().toLowerCase();
  const cat=filter.value;
  const filtered=items
    .map((item,index)=>({item,index}))
    .filter(({item})=>{
      const blob=[item.name,item.desc,item.source,item.category,item.date].join(' ').toLowerCase();
      return (!q || blob.includes(q)) && (!cat || item.category===cat);
    })
    .sort((a,b)=>{
      const dateCmp=String(b.item.date||'').localeCompare(String(a.item.date||''));
      if(dateCmp!==0) return dateCmp;
      return a.index-b.index;
    })
    .map(({item})=>item);
  grid.innerHTML='';
  filtered.forEach(item=>{
    const article=document.createElement('article');
    article.className='card';
    const zipBtn=item.zip_url
      ? `<a class="btn secondary" href="${item.zip_url}" target="_blank" rel="noopener">下載 ZIP</a>`
      : `<span class="btn secondary disabled">ZIP 內部控管</span>`;
    article.innerHTML=`
      <div class="meta"><span class="badge">${item.category}</span><time>${item.date}</time></div>
      <h2>${item.name}</h2>
      <p>${item.desc}</p>
      <p class="source"><strong>資料來源：</strong>${item.source}</p>
      <div class="links">
        <a class="btn primary" href="${item.url}" target="_blank" rel="noopener">打開 HTML PPT</a>
        ${zipBtn}
      </div>`;
    grid.appendChild(article);
  });
  countStat.textContent=`共 ${filtered.length} 份`;
}
search.addEventListener('input',render);
filter.addEventListener('change',render);
render();
</script>

</html>
