<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>毛天使粉絲專頁每日發文｜小張超能力</title>
<meta name="description" content="集中整理毛天使 Facebook 粉絲專頁每日發文，包含發文標題、日期與原始貼文連結，方便隨時查詢。" />
<style>
:root{--bg:#050b16;--bg2:#0b1730;--panel:rgba(12,24,48,.72);--panel2:rgba(16,34,66,.82);--line:rgba(116,213,255,.22);--ink:#f4f8ff;--muted:#b6c7e6;--mint:#76f3d8;--cyan:#71cfff;--violet:#8a80ff;--shadow:0 24px 70px rgba(0,0,0,.34)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;background:radial-gradient(circle at top left,rgba(113,207,255,.18),transparent 24%),radial-gradient(circle at top right,rgba(138,128,255,.16),transparent 22%),linear-gradient(180deg,var(--bg),var(--bg2) 55%,#08111f);color:var(--ink)}a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:20px 18px 120px}.hero{padding:18px 0 22px}.kicker{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(118,243,216,.08);border:1px solid rgba(118,243,216,.16);color:var(--mint);font:700 .8rem ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.12em;text-transform:uppercase}
h1{margin:16px 0 12px;font-size:clamp(2.2rem,6vw,4.2rem);line-height:.95;letter-spacing:-.06em}.lead{max-width:860px;color:var(--muted);font-size:clamp(1rem,2vw,1.12rem);line-height:1.72}
.panel{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(16,34,66,.92),rgba(12,24,48,.85));border:1px solid var(--line);border-radius:30px;padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
.panel::before{content:"";position:absolute;inset:auto -40px -50px auto;width:140px;height:140px;background:radial-gradient(circle,rgba(118,243,216,.16),transparent 70%)}
.statrow{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin:16px 0 8px}.stat{padding:18px;border-radius:22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.label{font-size:.82rem;color:#d8e8ff;letter-spacing:.08em;text-transform:uppercase}.value{margin-top:8px;font-size:1.9rem;font-weight:900}.sub{margin-top:6px;color:var(--muted);line-height:1.6}
.list{display:grid;gap:14px;margin-top:18px}.item{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:18px}.mini{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;font-size:1.5rem;background:linear-gradient(135deg,#56b7ff,#8a80ff)}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}.tag,.date,.status{padding:6px 10px;border-radius:999px;font-size:.78rem}.tag{background:rgba(118,243,216,.1);border:1px solid rgba(118,243,216,.16);color:#dffdf7}.date{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#dbe6fb}.status{background:rgba(113,207,255,.1);border:1px solid rgba(113,207,255,.18);color:#d9f6ff}.item h2{margin:0 0 8px;font-size:1.18rem;line-height:1.35}.item p{margin:0;color:var(--muted);line-height:1.65}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.chip{padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:.82rem;color:#dce9ff}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 15px;border-radius:15px;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--mint));color:#06213a}.btn.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--ink)}
.page-back{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:30;display:inline-flex;align-items:center;justify-content:center;gap:10px;min-width:250px;max-width:calc(100vw - 28px);padding:11px 18px;border-radius:999px;background:rgba(8,20,38,.88);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(16px);box-shadow:0 18px 40px rgba(0,0,0,.28);color:var(--ink);font-weight:800;font-size:.92rem}
.small{font-size:.92rem;color:var(--muted)}
@media(max-width:640px){.wrap{padding:16px 14px 120px}.item{grid-template-columns:1fr}.mini{width:48px;height:48px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="kicker">PETANGEL FB DAILY POSTS</div>
    <h1>毛天使粉絲專頁每日發文</h1>
    <p class="lead">這頁固定整理我每天幫毛天使 Facebook 粉絲專頁實際發出的內容，至少會保留發文標題、發文日期與原始貼文連結。之後你們要查我哪一天發了什麼，直接從這裡往下看就可以。</p>
  </section>

  <section class="panel">
    <div class="statrow">
      <div class="stat">
        <div class="label">總發文數</div>
        <div class="value" id="count">--</div>
        <div class="sub">目前已收錄在這頁的毛天使 FB 日更貼文數量。</div>
      </div>
      <div class="stat">
        <div class="label">最新發文日期</div>
        <div class="value" id="latestDate">--</div>
        <div class="sub">之後我每新增一篇，就會把最新日期往前推。</div>
      </div>
      <div class="stat">
        <div class="label">查詢方式</div>
        <div class="value" style="font-size:1.15rem;line-height:1.5">標題｜日期｜連結</div>
        <div class="sub">固定保留三個欄位，方便你們之後追發文歷史與內容方向。</div>
      </div>
    </div>
    <div id="postList" class="list"></div>
    <p class="small" id="lastUpdated">載入中…</p>
  </section>
</div>
<a class="page-back" href="/fsf-website-html-ppt/">⌂ 返回小張超能力主頁</a>
<script>
async function loadPosts(){
  const res = await fetch('./posts.json', {cache:'no-store'});
  const posts = await res.json();
  const sorted = posts.slice().sort((a,b)=> String(b.date).localeCompare(String(a.date)));
  document.getElementById('count').textContent = sorted.length;
  document.getElementById('latestDate').textContent = sorted[0]?.date || '尚無資料';
  document.getElementById('lastUpdated').textContent = `最後更新：${new Date().toLocaleString('zh-TW', {hour12:false})}`;
  const list = document.getElementById('postList');
  list.innerHTML = sorted.map(post => `
    <article class="item">
      <div class="mini">🐾</div>
      <div>
        <div class="meta">
          <span class="tag">毛天使 FB</span>
          <span class="date">${post.date}</span>
          <span class="status">${post.status || '已記錄'}</span>
        </div>
        <h2>${post.title}</h2>
        <p>${post.summary || ''}</p>
        <div class="chips">${(post.keywords || []).map(k => `<span class="chip">${k}</span>`).join('')}</div>
        <div class="actions">
          <a class="btn primary" href="${post.url}" target="_blank" rel="noopener">打開 Facebook 貼文 ↗</a>
        </div>
      </div>
    </article>
  `).join('');
}
loadPosts().catch(err => {
  document.getElementById('postList').innerHTML = `<article class="item"><div class="mini">⚠️</div><div><h2>資料載入失敗</h2><p>目前無法讀取發文列表，請稍後重整或通知我修復。</p></div></article>`;
  document.getElementById('count').textContent = '—';
  document.getElementById('latestDate').textContent = '—';
  document.getElementById('lastUpdated').textContent = err.message;
});
</script>
</body>
</html>
